name: eeg-sync
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - ffmpeg

  # PyTorch — CUDA 11.8 for Windows GPU, works on CPU/MPS too
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=11.8

  # Core
  - numpy>=1.24.0
  - pandas>=2.0.0
  - opencv>=4.8.0
  - matplotlib>=3.7.0

  # Gazelle dependency
  - timm>=0.9.0
  - scikit-learn

  - pip:
      # Video inference
      - ultralytics>=8.3.0
      - supervision>=0.21.0

      # Gaze analysis (Gazelle)
      - Pillow>=9.0.0

      # 3D pose (RTMPose3D — lightweight, no mmcv)
      - rtmlib

      # Dev tools
      - pytest>=7.0.0
      - pytest-cov>=4.0.0
      - black>=23.0.0
      - ruff>=0.1.0
      - mypy>=1.0.0

      # This package (editable install)
      - -e .
